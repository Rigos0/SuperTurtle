<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chattr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0b0b0f;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Navbar ── */
    .navbar {
      background: #12121a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid #2a2a3a;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }

    .navbar-brand {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar-brand .brand-icon {
      font-size: 20px;
    }

    .navbar-links {
      display: flex;
      gap: 4px;
      list-style: none;
    }

    .navbar-links a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .navbar-links a:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
    }

    .navbar-links a.active {
      color: #007aff;
      background: rgba(0, 122, 255, 0.1);
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .hamburger:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .hamburger svg {
      display: block;
    }

    .mobile-menu {
      display: none;
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      background: #12121a;
      border-bottom: 1px solid #2a2a3a;
      padding: 8px 16px;
      z-index: 99;
      flex-direction: column;
      gap: 2px;
    }

    .mobile-menu.open {
      display: flex;
    }

    .mobile-menu a {
      color: #888;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .mobile-menu a:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
    }

    .mobile-menu a.active {
      color: #007aff;
      background: rgba(0, 122, 255, 0.1);
    }

    @media (max-width: 600px) {
      .navbar-links { display: none; }
      .hamburger { display: block; }
    }

    /* ── Chat header ── */
    .header {
      background: #1a1a24;
      padding: 14px 20px;
      text-align: center;
      font-weight: 600;
      font-size: 17px;
      border-bottom: 1px solid #2a2a3a;
      flex-shrink: 0;
      letter-spacing: -0.3px;
    }

    .header .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c896, #007aff);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-right: 8px;
      vertical-align: middle;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      word-wrap: break-word;
      animation: messageIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .message.sent {
      align-self: flex-end;
      background: #007aff;
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .message.received {
      align-self: flex-start;
      background: #2a2a3a;
      color: #e8e8ed;
      border-bottom-left-radius: 6px;
    }

    .message .time {
      font-size: 11px;
      opacity: 0.5;
      margin-top: 4px;
      display: block;
    }

    .message.sent .time {
      text-align: right;
    }

    .typing-indicator {
      align-self: flex-start;
      background: #2a2a3a;
      padding: 12px 18px;
      border-radius: 18px;
      border-bottom-left-radius: 6px;
      display: none;
      gap: 5px;
      animation: messageIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      animation: typingDot 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    .input-bar {
      padding: 10px 12px;
      background: #1a1a24;
      border-top: 1px solid #2a2a3a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    .input-bar input {
      flex: 1;
      background: #2a2a3a;
      border: 1px solid #3a3a4a;
      border-radius: 22px;
      padding: 11px 18px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-bar input::placeholder {
      color: #666;
    }

    .input-bar input:focus {
      border-color: #007aff;
    }

    .input-bar button {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: #007aff;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .input-bar button:hover {
      background: #0066d6;
    }

    .input-bar button:active {
      transform: scale(0.92);
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    @media (max-width: 600px) {
      .message { max-width: 85%; }
      .header { padding: 12px 16px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <span class="brand-icon">💬</span> Chattr
    </div>
    <ul class="navbar-links">
      <li><a href="#" class="active">Chats</a></li>
      <li><a href="#">Contacts</a></li>
      <li><a href="#">Settings</a></li>
    </ul>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="mobile-menu" id="mobileMenu">
      <a href="#" class="active">Chats</a>
      <a href="#">Contacts</a>
      <a href="#">Settings</a>
    </div>
  </nav>

  <div class="header">
    <span class="avatar">T</span>
    Turtle
  </div>

  <div class="chat-container" id="chat">
    <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
  </div>

  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="Message" autocomplete="off">
    <button id="sendBtn" aria-label="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const typing = document.getElementById('typing');

    function formatTime(ts) {
      const d = ts ? new Date(ts) : new Date();
      return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function addMessage(text, type, timestamp) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `${escapeHtml(text)} <span class="time">${formatTime(timestamp)}</span>`;
      chat.insertBefore(div, typing);
      scrollToBottom();
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chat.scrollTop = chat.scrollHeight;
      });
    }

    async function loadMessages() {
      try {
        const res = await fetch('/api/messages');
        const messages = await res.json();
        for (const msg of messages) {
          const type = msg.sender === 'user' ? 'sent' : 'received';
          addMessage(msg.text, type, msg.timestamp);
        }
      } catch (e) {
        console.error('Failed to load messages:', e);
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage(text, 'sent');

      // Show typing indicator
      const thinkDelay = 400 + Math.random() * 600;
      setTimeout(() => {
        typing.classList.add('visible');
        scrollToBottom();
      }, thinkDelay);

      try {
        const res = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();

        // Show bot reply after a short delay for natural feel
        const replyDelay = 800 + Math.random() * 1200;
        setTimeout(() => {
          typing.classList.remove('visible');
          addMessage(data.botReply.text, 'received');
        }, replyDelay);
      } catch (e) {
        console.error('Failed to send message:', e);
        typing.classList.remove('visible');
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Hamburger menu toggle
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburgerBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('open');
    });

    // Close mobile menu when a link is tapped
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
      });
    });

    // Load messages from DB on page load
    loadMessages();
  </script>
</body>
</html>
