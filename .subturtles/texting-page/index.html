<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a2e;
      --input-bg: #16213e;
      --sent: #0f3460;
      --received: #252540;
      --text: #e0e0e0;
      --text-muted: #888;
      --accent: #4a9eff;
      --radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      padding: 14px 20px;
      text-align: center;
      font-weight: 600;
      font-size: 1.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 16px;
      border-radius: var(--radius);
      line-height: 1.45;
      font-size: 0.95rem;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    .bubble.sent {
      background: var(--sent);
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }

    .bubble.received {
      background: var(--received);
      align-self: flex-start;
      border-bottom-left-radius: 6px;
    }

    .bubble .time {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
    }

    .typing-indicator {
      align-self: flex-start;
      background: var(--received);
      padding: 12px 18px;
      border-radius: var(--radius);
      border-bottom-left-radius: 6px;
      display: flex;
      gap: 5px;
      animation: fadeIn 0.2s ease;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 12px 18px;
      border: none;
      border-radius: 24px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:active { opacity: 0.7; }

    @media (max-width: 500px) {
      .bubble { max-width: 85%; }
      #input-bar { padding: 10px 10px; }
    }
  </style>
</head>
<body>
  <header>Chat</header>
  <div id="messages"></div>
  <div id="input-bar">
    <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
    <button id="send-btn" aria-label="Send">&#9654;</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');

    const replies = [
      "Interesting, tell me more!",
      "Got it.",
      "Haha, nice one.",
      "That makes sense.",
      "I was just thinking the same thing.",
      "Oh really? Why's that?",
      "Noted!",
      "Hmm, let me think about that...",
      "Totally agree.",
      "No way!",
      "Cool, thanks for sharing.",
      "Can you elaborate on that?",
    ];

    function timeStr() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addBubble(text, type) {
      const el = document.createElement('div');
      el.className = `bubble ${type}`;
      el.innerHTML = `${escapeHtml(text)}<span class="time">${timeStr()}</span>`;
      messagesEl.appendChild(el);
      scrollBottom();
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing-indicator';
      el.id = 'typing';
      el.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(el);
      scrollBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addBubble(text, 'sent');

      const delay = 800 + Math.random() * 1200;
      showTyping();
      setTimeout(() => {
        hideTyping();
        const reply = replies[Math.floor(Math.random() * replies.length)];
        addBubble(reply, 'received');
      }, delay);
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    input.focus();
  </script>
</body>
</html>
